<div class="auth-container">
  <div class="glass-panel auth-panel">
    <div class="auth-header">
      <h1 class="logo-brand">Fanya</h1>
      <h2>Bem-vindo de volta</h2>
      <p>Acesse sua conta para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" autocomplete="off">
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          autocomplete="off"
          formControlName="email" 
          class="input-control" 
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="seu@email.com"
        >
        <div class="error-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">O e-mail é obrigatório.</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Digite um e-mail válido.</small>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          autocomplete="one-time-code"
          formControlName="password" 
          class="input-control" 
          [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Sua senha"
        >
        <div class="error-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">A senha é obrigatória.</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || isLoading">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        <span>{{ isLoading ? 'Entrando...' : 'Entrar' }}</span>
      </button>

      <div class="auth-footer">
        Não tem uma conta? <a routerLink="/register">Registre-se</a>
      </div>
    </form>
  </div>
</div>
