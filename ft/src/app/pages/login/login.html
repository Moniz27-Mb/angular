
<div class="auth-container">
  <div class="glass-panel auth-panel">
    <div class="auth-header">
      <h1 class="logo-brand">Fanya</h1>
      <h2>Bem-vindo de volta</h2>
      <p>Acesse sua conta para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" autocomplete="off">
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          autocomplete="off"
          formControlName="email" 
          class="input-control" 
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="seu@email.com"
        >
        <div class="error-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">O e-mail é obrigatório.</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Digite um e-mail válido.</small>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          autocomplete="one-time-code"
          formControlName="password" 
          class="input-control" 
          [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Sua senha"
        >
        <div class="error-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">A senha é obrigatória.</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || isLoading">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        <span>{{ isLoading ? 'Entrando...' : 'Entrar' }}</span>
      </button>

      <div style="display: flex; align-items: center; margin: 20px 0;">
        <div style="flex: 1; height: 1px; background-color: #e2e8f0;"></div>
        <span style="padding: 0 10px; color: #64748b; font-size: 0.85rem;">ou</span>
        <div style="flex: 1; height: 1px; background-color: #e2e8f0;"></div>
      </div>

      <button type="button" class="btn btn-block" style="background-color: white; color: #334155; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;" (click)="loginWithGoogle()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Entrar com o Google</span>
      </button>

      <div class="auth-footer">
        Não tem uma conta? <a routerLink="/register">Registre-se</a>
      </div>
    </form>
  </div>
</div>
