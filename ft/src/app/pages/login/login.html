<div class="auth-container">
  <div class="glass-panel auth-panel">
    <div class="auth-header">
      <h1 class="logo-brand">Fanya</h1>
      <h2>Bem-vindo</h2>
      <p>Acesse sua conta com código de verificação</p>
    </div>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" autocomplete="off">
      <div class="alert alert-danger" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-icon" style="margin-right: 8px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- STEP 1: EMAIL ENTRY -->
      <div *ngIf="step === 'email'" class="animate-in">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            autocomplete="off"
            formControlName="email" 
            class="input-control" 
            [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            placeholder="seu@email.com"
          >
          <div class="error-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <small *ngIf="loginForm.get('email')?.errors?.['required']">O e-mail é obrigatório.</small>
            <small *ngIf="loginForm.get('email')?.errors?.['email']">Digite um e-mail válido.</small>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.get('email')?.invalid || isLoading">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          <span>{{ isLoading ? 'Enviando...' : 'Avançar' }}</span>
        </button>

        <div style="display: flex; align-items: center; margin: 20px 0;">
          <div style="flex: 1; height: 1px; background-color: #e2e8f0;"></div>
          <span style="padding: 0 10px; color: #64748b; font-size: 0.85rem;">ou</span>
          <div style="flex: 1; height: 1px; background-color: #e2e8f0;"></div>
        </div>

        <button type="button" class="btn btn-block" style="background-color: white; color: #334155; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;" (click)="loginWithGoogle()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Entrar com o Google</span>
        </button>

        <div class="auth-footer">
          Não tem uma conta? <a routerLink="/register">Registre-se</a>
        </div>
      </div>

      <!-- STEP 2: OTP VERIFICATION -->
      <div *ngIf="step === 'otp'" class="animate-in">
        <div class="email-info-badge">
          <span>Código enviado para <strong>{{ loginForm.get('email')?.value }}</strong></span>
          <button type="button" class="btn-link-change" (click)="changeEmail()">Alterar</button>
        </div>

        <div class="input-group">
          <label for="otpCode">Código de 6 dígitos</label>
          <input 
            type="text" 
            id="otpCode" 
            name="otpCode"
            maxlength="6"
            pattern="\d*"
            autocomplete="one-time-code"
            formControlName="otpCode" 
            class="input-control code-input" 
            [class.input-error]="loginForm.get('otpCode')?.invalid && loginForm.get('otpCode')?.touched"
            placeholder="000000"
          >
          <div class="error-feedback" *ngIf="loginForm.get('otpCode')?.invalid && loginForm.get('otpCode')?.touched">
            <small>O código deve conter exatamente 6 dígitos.</small>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.get('otpCode')?.invalid || isLoading">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          <span>{{ isLoading ? 'Verificando...' : 'Confirmar Acesso' }}</span>
        </button>

        <div class="otp-actions">
          <button 
            type="button" 
            class="btn-resend" 
            [disabled]="resendCountdown > 0 || isLoading" 
            (click)="resendOtp()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-icon"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
            <span *ngIf="resendCountdown === 0">Reenviar código</span>
            <span *ngIf="resendCountdown > 0">Reenviar em {{ resendCountdown }}s</span>
          </button>
        </div>
      </div>

    </form>
  </div>
</div>
